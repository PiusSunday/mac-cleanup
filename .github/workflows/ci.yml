name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./lib"
          additional_files: "bin/mac-cleanup install.sh tests/smoke_test.sh"

  bats-tests:
    name: Bats Unit Tests
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Install Bats
        run: brew install bats-core
      - name: Run tests
        run: bats tests/

  smoke-test:
    name: Smoke Test
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Make executable
        run: chmod +x bin/mac-cleanup
      - name: Run smoke test
        run: bash tests/smoke_test.sh
